<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- 浏览器标题改为 DewSecure -->
    <title>DewSecure - Web Security</title>
    <link rel="icon" type="image/png" href="/DewSecure.png" sizes="64x64">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <!-- 强制黑色背景（覆盖可能的样式丢失） -->
    <style>
        body {
            background: #000000 !important;
            margin: 0;
            min-height: 100vh;
        }
        /* 确保容器背景透明，让 canvas 显示 */
        .container {
            background: transparent !important;
        }
        /* 占位样式保持 */
        .placeholder-message p {
            color: #94a3b8;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <!-- 背景画布由 js/bg-canvas.js 动态生成 -->
    <div class="container">
        <div class="header">
            <!-- 标题改为 DewSecure，图片引用 DewSecure.png -->
            <h1><img src="/DewSecure.png" alt="DewSecure" style="height: 64px; vertical-align: middle;"> DewSecure</h1>
            <div class="lang-switch">
                <button id="lang-toggle" class="lang-toggle-btn" aria-label="Select language">
                    🌐
                </button>
                <ul id="lang-dropdown" class="lang-dropdown" style="display: none;">
                    <li data-lang="en" class="lang-option active">English</li>
                    <li data-lang="zh" class="lang-option">中文</li>
                    <li data-lang="ms" class="lang-option">Bahasa Melayu</li>
                </ul>
            </div>
        </div>

        <!-- 占位信息 -->
        <div class="placeholder-message">
            <p>🚀 重构中，新功能即将上线...</p>
        </div>
    </div>

    <!-- 背景绘制脚本 -->
    <script src="js/bg-canvas.js"></script>
    <!-- 精简后的主脚本（仅语言切换） -->
    <script src="js/app.js"></script>
</body>
</html>
