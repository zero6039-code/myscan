<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NetEye - Web Vulnerability Scanner</title>
    <!-- 添加 favicon（使用您上传的 neteye.png） -->
    <link rel="icon" type="image/png" href="/neteye.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <!-- 在标题前显示图标 -->
                <img src="/neteye.png" alt="NetEye" style="height: 32px; vertical-align: middle;"> NetEye
            </h1>
            <div class="action-buttons">
                <div class="lang-switch" role="group" aria-label="Language switch">
                    <button id="lang-en" class="lang-btn active">English</button>
                    <button id="lang-zh" class="lang-btn">中文</button>
                </div>
                <button id="theme-toggle" class="theme-btn" aria-label="Dark mode">🌙</button>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="target" placeholder="https://example.com" aria-label="Target URL" />
            <div class="depth-selector">
                <label id="quick-label"><input type="radio" name="depth" value="quick" checked /> Quick Scan</label>
                <label id="deep-label"><input type="radio" name="depth" value="deep" /> Deep Scan</label>
            </div>
            <button id="scan-btn" aria-label="Start scan">Start Scan</button>
        </div>

        <!-- 进度条区域 -->
        <div id="progress-container" style="display: none;">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="progress-message" class="progress-message"></div>
        </div>

        <div id="scan-time" class="scan-time" style="display: none;"></div>

        <div id="result-container" style="display: none;"></div>
        <div id="error-container" style="display: none;" class="error-card"></div>
        <div id="loading" style="display: none;" class="loading">
            <div class="loader"></div>
            <span>Scanning...</span>
        </div>

        <!-- 导出和邮件按钮区域 -->
        <div id="export-container" style="display: none; text-align: right; margin-top: 16px;">
            <button id="export-menu-btn" class="export-btn">📄 Report Export as</button>
            <button id="email-report-btn" class="email-btn" title="Send report via email">
                <i class="fas fa-envelope"></i>
            </button>
        </div>

        <!-- 导出选项模态框 -->
        <div id="export-modal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 300px;">
                <div class="modal-header">
                    <h3>Export Report</h3>
                    <span class="modal-close">&times;</span>
                </div>
                <div class="modal-body" style="text-align: center;">
                    <button id="export-json-btn" class="export-option">Export as JSON</button>
                    <button id="export-pdf-btn" class="export-option">Export as PDF</button>
                    <button id="export-html-btn" class="export-option">Export as HTML</button>
                </div>
            </div>
        </div>

        <!-- 自定义邮箱输入模态框（右下角） -->
        <div id="email-modal" class="email-modal">
            <div class="email-modal-content">
                <div class="email-modal-header">
                    <span>Send Report via Email</span>
                    <span class="email-modal-close">&times;</span>
                </div>
                <div class="email-modal-body">
                    <input type="email" id="report-email" placeholder="Enter your email address" autocomplete="off">
                    <div id="email-error" class="email-error" style="display: none;">Please enter a valid email address.</div>
                </div>
                <div class="email-modal-footer">
                    <button id="email-send-btn" class="email-send-btn">Send</button>
                    <button id="email-cancel-btn" class="email-cancel-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
