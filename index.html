<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DewSecure - Web Security</title>
    <link rel="icon" type="image/png" href="/DewSecure.png" sizes="64x64">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <style>
        /* 强制黑色背景，覆盖所有冲突 */
        html, body {
            background: #000000 !important;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            box-shadow: none !important;
            padding: 12px 0 40px 0 !important;
            max-width: 100% !important;
        }
        .header {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            padding: 0 !important;
            margin-bottom: 28px !important;
            flex-wrap: wrap !important;
            gap: 12px !important;
        }
        h1 {
            font-size: 32px;
            margin: 0;
            display: flex;
            align-items: center;
            padding-left: 0 !important;
        }
        h1 img {
            height: 80px !important;
            width: 80px !important;        /* 固定宽高，确保正圆 */
            object-fit: contain !important; /* 保持比例，圆形图片显示为正圆 */
            vertical-align: middle;
            margin-right: 12px;
        }
        .lang-switch {
            position: relative;
            display: inline-block;
        }
        .lang-toggle-btn {
            background: transparent !important;
            border: none !important;
            font-size: 36px !important;
            width: auto !important;
            height: auto !important;
            padding: 0 8px !important;
            color: #cbd5e1 !important;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1;
            box-shadow: none !important;   /* 移除可能存在的阴影 */
        }
        .lang-toggle-btn:hover {
            transform: scale(1.1);
            color: white;
        }
        .lang-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            min-width: 140px;
            padding: 6px 0;
            list-style: none;
            margin: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .lang-dropdown li {
            padding: 6px 20px;
            margin: 1px 6px;
            font-size: 14px;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .lang-dropdown li:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .lang-dropdown li.active {
            background: #0070f3;
            color: white;
            font-weight: 600;
        }
        .placeholder-message {
            text-align: center;
        }
        .placeholder-message p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 60px;
            background: rgba(255,255,255,0.03);
            padding: 20px 40px;
            border-radius: 12px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.05);
            display: inline-block;
        }
        /* 确保 canvas 在最底层 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        /* 移除所有可能给地球按钮加背景的全局样式 */
        button.lang-toggle-btn {
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><img src="/DewSecure.png" alt="DewSecure"> DewSecure</h1>
            <div class="lang-switch">
                <button id="lang-toggle" class="lang-toggle-btn" aria-label="Select language">
                    🌐
                </button>
                <ul id="lang-dropdown" class="lang-dropdown" style="display: none;">
                    <li data-lang="en" class="lang-option active">English</li>
                    <li data-lang="zh" class="lang-option">中文</li>
                    <li data-lang="ms" class="lang-option">Bahasa Melayu</li>
                </ul>
            </div>
        </div>
        <div class="placeholder-message">
            <p>🚀 重构中，新功能即将上线...</p>
        </div>
    </div>

    <script src="js/bg-canvas.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
