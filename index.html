<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DewSecure - Web Security</title>
    <link rel="icon" type="image/png" href="/DewSecure.png">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #000; margin: 0; padding: 0; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* 导航栏整体容器 */
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 50px; z-index: 100; position: relative; }
        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; }
        .logo img { height: 40px; margin-right: 12px; }

        /* 居中菜单 */
        .nav-menu { display: flex; gap: 40px; }
        .nav-item { position: relative; cursor: pointer; padding: 10px 0; font-weight: 500; transition: 0.3s; }
        .nav-item:hover { color: #0070f3; }

        /* 顺滑下拉菜单 */
        .dropdown { position: absolute; top: 100%; left: 0; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 0; min-width: 150px; opacity: 0; visibility: hidden; transform: translateY(10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dropdown a { display: block; padding: 8px 20px; color: #ccc; text-decoration: none; }
        .nav-item:hover .dropdown { opacity: 1; visibility: visible; transform: translateY(0); }

        /* 右侧统计栏 */
        .nav-stats { text-align: right; cursor: pointer; transition: 0.3s; padding-right: 20px; }
        .nav-stats .label { font-size: 12px; color: #888; display: block; }
        .nav-stats .count { font-size: 28px; font-weight: 800; }
        .nav-stats:hover .label, .nav-stats:hover .count { color: #ff4d4d; }

        /* 原有样式兼容 */
        .container { max-width: 100%; padding: 0; }
        .placeholder-message { display: flex; justify-content: center; align-items: center; min-height: 400px; }
        .placeholder-message p { color: #94a3b8; font-size: 1.5rem; background: rgba(255,255,255,0.05); padding: 20px 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="/DewSecure.png"> DewSecure</div>
        <div class="nav-menu">
            <div class="nav-item">产品 <i class="fa fa-chevron-down"></i>
                <div class="dropdown">
                    <a href="#">安全审计</a><a href="#">漏洞扫描</a>
                </div>
            </div>
            <div class="nav-item">解决方案 <i class="fa fa-chevron-down"></i>
                <div class="dropdown">
                    <a href="#">DeFi 安全</a><a href="#">链上追踪</a>
                </div>
            </div>
            <div class="nav-item">公司介绍</div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="nav-stats">
                <span class="label">服务客户</span>
                <span class="count">69</span>
            </div>
            <div class="lang-switch">
                <button id="lang-toggle" style="background:none; border:none; color:#fff; cursor:pointer; font-size:24px;">🌐</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="placeholder-message">
            <p>🚀 重构中，新功能即将上线...</p>
        </div>
    </div>

    <script src="/js/bg-canvas.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
