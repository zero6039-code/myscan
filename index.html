<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DewSecure - Web Security</title>
    <link rel="icon" type="image/png" href="/DewSecure.png" sizes="128x128">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <style>
        body { background: #000; margin: 0; padding: 0; min-height: 100vh; font-family: sans-serif; }
        .container { max-width: 100%; padding: 12px 20px 40px; background: transparent; position: relative; z-index: 1; }
        
        /* 核心一等舱：原装 H1 巨大组合与现代菜单混排 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; position: relative; z-index: 100; }
        
        /* 严格保持原本大小 */
        h1 { font-size: 56px; margin: 0; display: flex; align-items: center; background: linear-gradient(120deg, #0070f3, #00a6f4); background-clip: text; -webkit-background-clip: text; color: transparent; }
        h1 img { height: 160px; width: 160px; object-fit: contain; border-radius: 50%; margin-right: 16px; }
        
        /* 中间菜单区 */
        .nav-menu { display: flex; gap: 40px; margin-left: 20px; }
        .nav-item { position: relative; cursor: pointer; padding: 10px 0; font-weight: 500; color: #fff; transition: color 0.3s; }
        .nav-item:hover { color: #00a6f4; }

        /* CertiK 顺滑级联下拉菜单 */
        .dropdown { position: absolute; top: 100%; left: 0; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 0; min-width: 150px; opacity: 0; visibility: hidden; transform: translateY(10px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dropdown a { display: block; padding: 10px 20px; color: #ccc; text-decoration: none; font-size: 14px; }
        .dropdown a:hover { color: #fff; background: #222; }
        .nav-item:hover .dropdown { opacity: 1; visibility: visible; transform: translateY(0); }

        /* 右侧交互区控制 */
        .header-right { display: flex; align-items: center; gap: 40px; }

        /* 右侧统计区：数字在上，文字在下 */
        .nav-stats { text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-stats .count { font-size: 36px; font-weight: 800; color: #fff; line-height: 1.1; transition: color 0.3s; }
        .nav-stats .label { font-size: 13px; color: #888; margin-top: 4px; display: block; transition: color 0.3s ease; }
        
        /* 停留时的特殊渐变规范 */
        .nav-stats:hover .count { color: #ff4d4d; }
        .nav-stats:hover .label { color: #ffffff; }

        /* 多语言环境按钮 */
        .lang-switch { position: relative; display: inline-block; }
        .lang-toggle-btn { background: transparent; border: none; font-size: 40px; color: #cbd5e1; cursor: pointer; padding: 0; transition: transform 0.2s, color 0.2s; }
        .lang-toggle-btn:hover { transform: scale(1.1); color: white; }
        .lang-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: rgba(20,20,40,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; min-width: 140px; padding: 6px 0; list-style: none; margin: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 101; }
        .lang-dropdown li { padding: 6px 20px; margin: 1px 6px; font-size: 14px; color: #cbd5e1; cursor: pointer; border-radius: 6px; }
        .lang-dropdown li:hover { background: rgba(255,255,255,0.1); color: white; }
        .lang-dropdown li.active { background: #0070f3; color: white; font-weight: 600; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><img src="/DewSecure.png" alt="DewSecure"> DewSecure</h1>
            
            <div class="nav-menu">
                <div class="nav-item" data-i18n="product">产品 <i class="fa fa-chevron-down"></i>
                    <div class="dropdown">
                        <a href="#" data-i18n="audit">安全审计</a>
                        <a href="#" data-i18n="scan">漏洞扫描</a>
                    </div>
                </div>
                <div class="nav-item" data-i18n="solution">解决方案 <i class="fa fa-chevron-down"></i>
                    <div class="dropdown">
                        <a href="#" data-i18n="defi">DeFi 安全</a>
                        <a href="#" data-i18n="track">链上追踪</a>
                    </div>
                </div>
                <div class="nav-item" data-i18n="company">公司介绍</div>
            </div>

            <div class="header-right">
                <div class="nav-stats">
                    <span class="count">69</span>
                    <span class="label" data-i18n="clients">服务客户</span>
                </div>

                <div class="lang-switch">
                    <button id="lang-toggle" class="lang-toggle-btn">🌐</button>
                    <ul id="lang-dropdown" class="lang-dropdown" style="display: none;">
                        <li data-lang="en" class="lang-option active">English</li>
                        <li data-lang="zh" class="lang-option">中文</li>
                        <li data-lang="ms" class="lang-option">Bahasa Melayu</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="placeholder-message">
            <p>🚀 重构中，新功能即将上线...</p>
        </div>
    </div>

    <script src="/js/bg-canvas.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
