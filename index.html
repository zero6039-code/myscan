<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MyScan - Web Vulnerability Scanner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MyScan</h1>
            <div class="lang-switch">
                <button id="lang-en" class="lang-btn active">English</button>
                <button id="lang-zh" class="lang-btn">中文</button>
            </div>
        </div>
        <div class="input-group">
            <input type="text" id="target" placeholder="https://example.com" />
            <button id="scan-btn">Start Scan</button>
        </div>
        <div id="result-container" style="display: none;">
            <!-- 结果将动态渲染到这里 -->
        </div>
        <div id="error-container" style="display: none;" class="error-card"></div>
        <div id="loading" style="display: none;" class="loading">Scanning...</div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
