<!DOCTYPE html>
<html lang="en" data-theme="dark" class="i18n-loading">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - DewSecure</title>
    <style>
        .i18n-loading [data-i18n] { visibility: hidden !important; }
    </style>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">
    <style>
        /* 博客专用样式 */
        .blog-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            color: #cbd5e1;
        }
        .blog-container h2 {
            font-size: 28px;
            color: #00a6f4;
            margin-bottom: 20px;
        }
        .post-list a {
            display: block;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #cbd5e1;
            text-decoration: none;
            transition: color 0.2s;
        }
        .post-list a:hover { color: #00a6f4; }
        .post-title { font-size: 18px; font-weight: 600; }
        .post-date { font-size: 13px; color: #64748b; }
        .back-link { margin-top: 30px; display: inline-block; color: #ff4a5a; }
        #article-content {
            line-height: 1.8;
            word-break: break-word;
        }
        #article-content pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;"></canvas>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <h1><img src="DewSecure.png" alt="Logo"> DewSecure</h1>
            </div>
            <nav class="nav-menu">
                <div class="nav-item"><span>博客</span></div>
                <div class="nav-item"><a href="index.html" style="color:inherit;text-decoration:none;">返回首页</a></div>
            </nav>
        </header>

        <div class="blog-container">
            <div id="post-list-view">
                <h2>📝 安全文章</h2>
                <div class="post-list" id="post-list"></div>
            </div>
            <div id="post-detail-view" style="display:none;">
                <a href="#" id="back-to-list" class="back-link">← 返回文章列表</a>
                <h2 id="article-title"></h2>
                <p id="article-date" style="color:#64748b; font-size:13px;"></p>
                <div id="article-content"></div>
            </div>
        </div>
    </div>

    <script src="js/bg-canvas.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
